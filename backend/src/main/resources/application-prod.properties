# Production Configuration
# Override these with environment variables when deploying

# Database Configuration (use environment variables in production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petstore}
spring.datasource.username=${DB_USER:petstore_user}
spring.datasource.password=${DB_PASSWORD:petstore_pass}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.show-sql=false

# Server Configuration
server.port=${SERVER_PORT:8080}

# CORS (configured in CorsConfig.java, uses ALLOWED_ORIGINS env var)
