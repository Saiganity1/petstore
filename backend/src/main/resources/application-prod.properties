# Production Configuration
# Use Spring Boot standard environment variables

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petstore_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petstore_pass}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# CORS Configuration (configured in CorsConfig.java)
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Application
spring.application.name=petstore-backend
logging.level.root=INFO
